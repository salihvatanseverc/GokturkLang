<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>GokturkStudio</title>

    <style>
        body {
            margin: 0;
            font-family: Consolas;
            background: #1e1e1e;
            color: white;
            overflow: hidden;
        }

        #topbar {
            height: 40px;
            background: #2b2b2b;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
        }

        button:hover {
            background: #666;
        }

        #editor {
            width: 100%;
            height: calc(100vh - 40px);
            background: #111;
            color: #0f0;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 14px;
            resize: none;
        }
    </style>
</head>

<body>

    <div id="topbar">

        <button onclick="runCode()">Çalıştır</button>

        <button onclick="clearEditor()">Temizle</button>

    </div>

    <textarea id="editor"></textarea>

    <script>
        const { ipcRenderer } =
            window.require
            ? window.require("electron")
            : {};

        const editor =
            document.getElementById("editor");

        function runCode() {

            const code =
                editor.value;

            if (ipcRenderer) {

                ipcRenderer.send(
                    "run-code",
                    code
                );
            }
        }

        function clearEditor() {

            editor.value = "";
        }
    </script>

</body>

</html>
