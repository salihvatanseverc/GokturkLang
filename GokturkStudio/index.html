<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>GokturkStudio</title>

    <style>
        body {
            margin: 0;
            font-family: Consolas;
            background: #1e1e1e;
            color: white;
        }

        #editor {
            width: 100%;
            height: 70vh;
            background: #111;
            color: #0f0;
            border: none;
            outline: none;
            padding: 10px;
            font-size: 14px;
        }

        #bar {
            padding: 10px;
            background: #333;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="bar">
        <button onclick="runCode()">Çalıştır</button>
    </div>

    <textarea id="editor">
// GokturkLang Test

x = 5 + 8
yazdır(x)

eğer (x > 10)
{
    yazdır("Büyük")
}
değilse
{
    yazdır("Küçük")
}
    </textarea>

    <script>
        const { ipcRenderer } =
            window.require ?
            window.require("electron") :
            {};

        function runCode() {

            const code =
                document.getElementById("editor").value;

            // Electron varsa output penceresine gönder
            if (ipcRenderer) {

                ipcRenderer.send(
                    "run-code",
                    code
                );
            }

            console.log(code);
        }
    </script>

</body>

</html>
