<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>GokturkLang Console</title>

    <style>
        body {
            margin: 0;
            background: #0f0f0f;
            font-family: Consolas;
            color: white;
        }

        #console {
            padding: 10px;
            height: 100vh;
            overflow-y: auto;
        }

        .error {
            color: #ff4d4d;
        }

        .warning {
            color: #ffb84d;
        }

        .output {
            color: #ffffff;
        }

        .title {
            background: #1a1a1a;
            padding: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="title">
        GokturkLang Output Console
    </div>

    <div id="console"></div>

    <script>
        const { ipcRenderer } =
            window.require
            ? window.require("electron")
            : {};

        const consoleDiv =
            document.getElementById("console");

        function log(type, message) {

            const line =
                document.createElement("div");

            line.className = type;
            line.innerText = message;

            consoleDiv.appendChild(line);

            consoleDiv.scrollTop =
                consoleDiv.scrollHeight;
        }

        // Electron'dan veri al
        if (ipcRenderer) {

            ipcRenderer.on("output", (event, data) => {

                log("output", data);
            });

            ipcRenderer.on("error", (event, data) => {

                log("error", data);
            });

            ipcRenderer.on("warning", (event, data) => {

                log("warning", data);
            });
        }

        // TEST
        log("output", "Sistem hazır");
    </script>

</body>

</html>
