<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<title>Göktürk Studio</title>

<style>

body {
    margin: 0;
    font-family: Consolas;
    background: #1e1e1e;
    color: #d4d4d4;
    overflow: hidden;
}

/* TOP BAR */
.topbar {
    height: 35px;
    background: #252526;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 15px;
    font-size: 13px;
}

/* MAIN AREA */
.container {
    display: flex;
    height: calc(100vh - 35px);
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #2d2d2d;
    padding: 10px;
    font-size: 13px;
}

/* EDITOR */
.editor {
    flex: 1;
    display: flex;
}

/* LINE NUMBERS */
.linenums {
    width: 60px;
    background: #1b1b1b;
    text-align: right;
    padding-right: 10px;
    color: #666;
    user-select: none;
    line-height: 20px;
    font-size: 14px;
}

/* TEXTAREA */
textarea {
    flex: 1;
    background: #1e1e1e;
    border: none;
    outline: none;
    color: #d4d4d4;
    padding: 10px;
    font-size: 14px;
    resize: none;
}

/* OUTPUT */
.output {
    height: 120px;
    background: black;
    border-top: 1px solid #333;
    color: #00ff88;
    padding: 10px;
    font-size: 13px;
    overflow: auto;
}

.menu span {
    cursor: pointer;
}

.menu span:hover {
    color: #00ff88;
}

</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="menu">
        <span>Dosya</span>
        <span>Çalıştır</span>
        <span>Kütüphaneler</span>
        <span>Ayarlar</span>
        <span>Yardım</span>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        📁 Proje<br><br>
        main.gtk<br>
        stdlib/<br>
        engine/
    </div>

    <!-- EDITOR -->
    <div class="editor">

        <div class="linenums" id="lines"></div>

        <textarea id="code"></textarea>

    </div>

</div>

<!-- OUTPUT -->
<div class="output" id="output">
Göktürk Studio hazır...
</div>

<script>

// =========================
// ELEMENTS
// =========================

const code =
    document.getElementById("code");

const lines =
    document.getElementById("lines");

// =========================
// SATIR SAYISI (MAX 90.000)
// =========================

function updateLines() {

    const count =
        code.value.split("\n").length;

    let html = "";

    const max =
        Math.min(count, 90000);

    for (let i = 1; i <= max; i++) {
        html += i + "<br>";
    }

    lines.innerHTML = html;
}

// =========================
// SCROLL SYNC
// =========================

code.addEventListener("scroll", () => {
    lines.scrollTop = code.scrollTop;
});

// =========================
// INPUT EVENT
// =========================

code.addEventListener("input", updateLines);

// INIT
updateLines();

</script>

</body>
</html>
